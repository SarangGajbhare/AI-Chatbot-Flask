<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body{
            font-family: "Times New Roman",sans-serif;
            background: #f4f1f1;
        }

        #chatbox {
            height: 400px;
            overflow-y: auto;
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            margin: 5px;
        }

        .bot {
            text-align: left;
            margin: 5px;
        }

        .bubble {
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
        }

        .user .bubble {
            background: #00a6ff;
            color: white;
        }

        .bot .bubble{
            background: #e0e0e0;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }


        h2   {
            color: #ff0015;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>AI Chatbot</h2>

<div id="chatbox" ></div>

<input type="text" id="userInput" placeholder="Type a message.....">
<button onclick="sendMessage()">Send</button>

<script>
    async function sendMessage() {
        let inputField = document.getElementById("userInput")
        let message = inputField.value;

        if (!message.trim()) return;

        let chatbox = document.getElementById("chatbox")

        //user Message
        chatbox.innerHTML += `
        <div class="user">
                <div class="bubble">${message}</div>
            </div>
        `;
        inputField.value = "";

        //Loader
        let typingId = "typing-" + Date.now();
        chatbox.innerHTML += `
        <div class="bot" id="${typingId }">
                <div class="bubble">Typing...</div>
            </div>
        `
        ;
        chatbox.scrollTop = chatbox.scrollHeight;
    try {
        let response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        let data = await response.json();

        //Remove Loader
        let typing = document.getElementById(typingId);
        if (typing) typing.remove();

        //Bot Reply
        chatbox.innerHTML += `
        <div class="bot">
                <div class="bubble">${data.reply}</div>
            </div>
        `
        ;
    }
    catch (error){
        let typing = document.getElementById("typing");
        if(typing) typing.remove()

        chatbox.inputField += `
        <div class = "bot">
            <div class="bubble">Server Error</div>
        </div>
        `
        ;
    }
    chatbox.scrollTop = chatbox.scrollHeight
    }

    // Enter key support
    document.getElementById("userInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

        // Load chat history on page load
        window.onload = async function ()
        {
            let chatbox = document.getElementById("chatbox");

            try
            {
                let response = await fetch("/history");
                let data = await response.json();

                data.forEach(chat =>
                {
                    chatbox.innerHTML += `
                    <div class="user">
                            <div class="bubble">${chat.user}</div>
                        </div>

                        <div class="bot">
                            <div class="bubble">${chat.bot}</div>
                        </div>
                    `
                    ;
                });

                chatbox.scrollTop = chatbox.scrollHeight;
            } catch (error)
            {
                console.log("History load error...")
            }
        };
</script>
</body>
</html>`
